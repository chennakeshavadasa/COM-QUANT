name: Daily COM-QUANT Update

on:
  schedule:
    # 02:00, 08:00, 14:00, 20:00 UTC — Monday through Friday only
    - cron: '0 2,8,14,20 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engine
        run: python src/engine.py

      - name: Build dashboard
        run: python src/build_dashboard.py

      - name: Deploy to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the generated files
          cp multi_data.json /tmp/multi_data.json
          cp index.html /tmp/index.html
          cp .nojekyll /tmp/.nojekyll

          # Switch to gh-pages branch (create if needed)
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

          # Clear everything and place only the site files
          git rm -rf . --quiet 2>/dev/null || true

          cp /tmp/multi_data.json ./multi_data.json
          cp /tmp/index.html ./index.html
          cp /tmp/.nojekyll ./.nojekyll

          git add multi_data.json index.html .nojekyll

          if git diff --cached --quiet; then
            echo "No data change — skipping deploy."
          else
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin gh-pages
          fi
