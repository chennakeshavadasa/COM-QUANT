name: Daily COM-QUANT Update

on:
  schedule:
    # 02:00, 08:00, 14:00, 20:00 UTC — Monday through Friday only
    - cron: '0 2,8,14,20 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run engine
        run: python src/engine.py

      - name: Build dashboard
        run: python src/build_dashboard.py

      - name: Commit data to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add multi_data.json
          if git diff --cached --quiet; then
            echo "No data change — skipping commit."
          else
            git commit -m "data: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      - name: Deploy index.html to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Use a worktree to avoid switching branches in the main workspace
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages-deploy gh-pages

          cp index.html /tmp/gh-pages-deploy/index.html
          cp .nojekyll /tmp/gh-pages-deploy/.nojekyll

          cd /tmp/gh-pages-deploy
          git add index.html .nojekyll

          if git diff --cached --quiet; then
            echo "No dashboard change — skipping deploy."
          else
            git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin gh-pages
          fi
